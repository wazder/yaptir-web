<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="yaptirio AI Asistanı - Sektörünüzdeki otomasyon potansiyeli nedir?">
    <title>yaptirio | AI Galaxy Chat</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="src/styles/main.css"> <!-- Base styles -->
    <link rel="stylesheet" href="src/styles/pages/ai-chat.css"> <!-- Page specific -->
</head>

<body>

    <!-- Fixed Header -->
    <header class="chat-header">
        <a href="/" class="chat-header__logo">
            <span class="logo-text">yaptirio</span>
            <span class="logo-dot">.</span>
        </a>
    </header>

    <!-- Starry Background -->
    <canvas id="ai-chat-canvas"></canvas>

    <!-- Scroll Sections -->
    <div class="scroll-container">

        <!-- SECTION 1: Intro -->
        <section class="chat-section" id="intro-section">
            <div class="intro-content">
                <h1 class="intro-title">
                    Sektörünüzün Geleceğini <br>
                    <span class="text-gradient-galaxy">Keşfetmeye Hazır mısınız?</span>
                </h1>
                <p class="intro-subtitle">Yapay zeka ile sınırları kaldırın. Sorularınızı sorun, cevabı verilerde
                    bulalım.</p>

                <div class="intro-scroll-hint">
                    👇 Aşağı Kaydırın & Sohbet Edin
                </div>
            </div>
        </section>

        <!-- SECTION 2: Chat Interface -->
        <section class="chat-section" id="chat-section">
            <div class="chat-wrapper">

                <!-- History Area -->
                <div class="chat-history" id="chat-history">
                    <div class="message message-ai">
                        Merhaba! Ben yaptirio AI Asistanı. Sektörünüzdeki otomasyon potansiyelini merak ediyor musunuz?
                        Bana istediğinizi sorun. 🌌
                    </div>
                </div>

                <!-- Suggestions -->
                <div class="chat-suggestions" id="chat-suggestions">
                    <!-- Chips inserted by JS -->
                </div>

                <!-- Input Area -->
                <div class="chat-input-box">
                    <input type="text" id="user-prompt" class="chat-input" placeholder="Aklınızdakini yazın..."
                        autocomplete="off">
                    <button id="submit-prompt" class="chat-submit-btn" aria-label="Gönder">
                        <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                            <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>

            </div>
        </section>

    </div>

    <!-- Scripts -->
    <script type="module" src="src/modules/aiChat.js"></script>
</body>

</html>
